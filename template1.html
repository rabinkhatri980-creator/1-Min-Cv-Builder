<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Modern CV Builder</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{display:flex;height:100vh;background:linear-gradient(135deg,#667eea,#764ba2);}

/* LEFT */
.form{
  width:30%;
  padding:25px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  color:white;
  overflow:auto;
}

input,textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
}

/* RIGHT */
.preview{
  width:70%;
  padding:70px 20px;
  overflow:auto;
}

/* TOP */
.topbar{
  position:fixed;
  left:30%;
  right:0;
  top:0;
  height:60px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* CV */
.cv{
  width:750px;
  margin:auto;
  background:white;
  border-radius:10px;
  overflow:hidden;
}

.header{
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  color:white;
  padding:30px;
  display:flex;
}

.photo{
  width:110px;
  height:110px;
  border-radius:50%;
  border:4px solid white;
  object-fit:cover;
}

.header-text{margin-left:20px;}

.main{display:flex;}

.left{width:35%;background:#f7f7f7;padding:20px;}
.right{width:65%;padding:20px;}

h3{border-bottom:2px solid #4facfe;margin-bottom:5px;}

.section{margin-bottom:20px;}

/* DOWNLOAD (BOTTOM) */
.download{
  text-align:center;
  margin:20px;
}

.download button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.pdf{background:#4facfe;color:white;}
.jpg{background:#00c853;color:white;}
.png{background:#ff9800;color:white;}

</style>
</head>

<body>

<!-- FORM -->
<div class="form">
<h2>Build CV</h2>

<input id="name" placeholder="Name">
<textarea id="about" placeholder="About"></textarea>

<h3>Contact</h3>
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="country" placeholder="Country">
<input id="location" placeholder="Location">
<input id="zip" placeholder="Zip Code">

<h3>Work Experience</h3>
<textarea id="experience"></textarea>

<h3>Education</h3>
<textarea id="education"></textarea>

<h3>Skills</h3>
<textarea id="skills"></textarea>

<h3>Language</h3>
<textarea id="language"></textarea>

<input type="file" id="photo">
</div>

<!-- RIGHT -->
<div class="preview">

<div class="topbar">
  <h3>CV Preview</h3>
</div>

<div class="cv" id="cv">

<div class="header">
  <img id="p_img" class="photo">
  <div class="header-text">
    <h1 id="p_name">Your Name</h1>
  </div>
</div>

<div class="main">

<div class="left">

<div class="section">
<h3>Contact</h3>
<p id="p_phone"></p>
<p id="p_email"></p>
<p id="p_country"></p>
<p id="p_location"></p>
<p id="p_zip"></p>
</div>

<div class="section">
<h3>Skills</h3>
<p id="p_skills"></p>
</div>

<div class="section">
<h3>Language</h3>
<p id="p_language"></p>
</div>

</div>

<div class="right">

<div class="section">
<h3>About</h3>
<p id="p_about"></p>
</div>

<div class="section">
<h3>Work Experience</h3>
<p id="p_experience"></p>
</div>

<div class="section">
<h3>Education</h3>
<p id="p_education"></p>
</div>

</div>

</div>

</div>

<!-- DOWNLOAD BOTTOM -->
<div class="download">
<button class="pdf" onclick="downloadPDF()">PDF</button>
<button class="jpg" onclick="downloadJPG()">JPG</button>
<button class="png" onclick="downloadPNG()">PNG</button>
</div>

</div>

<script>

const fields = ["name","about","phone","email","country","location","zip","experience","education","skills","language"];

fields.forEach(id=>{
  document.getElementById(id).addEventListener("input", update);
});

function update(){
  fields.forEach(id=>{
    document.getElementById("p_"+id).innerText =
    document.getElementById(id).value;
  });
}

/* PHOTO */
document.getElementById("photo").addEventListener("change", function(){
  const file = this.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = e=>{
      document.getElementById("p_img").src = e.target.result;
    }
    reader.readAsDataURL(file);
  }
});

/* DOWNLOAD */
function downloadPDF(){
  html2canvas(document.getElementById("cv"),{scale:2}).then(canvas=>{
    const img = canvas.toDataURL("image/png");
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();
    pdf.addImage(img,'PNG',0,0,210,297);
    pdf.save("CV.pdf");
  });
}

function downloadJPG(){
  html2canvas(document.getElementById("cv"),{scale:2}).then(canvas=>{
    const link=document.createElement("a");
    link.download="CV.jpg";
    link.href=canvas.toDataURL("image/jpeg");
    link.click();
  });
}

function downloadPNG(){
  html2canvas(document.getElementById("cv"),{scale:2}).then(canvas=>{
    const link=document.createElement("a");
    link.download="CV.png";
    link.href=canvas.toDataURL("image/png");
    link.click();
  });
}

</script>

</body>
</html>
