<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional CV</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  display:flex;
  flex-wrap:wrap;
}

/* LEFT SIDE */
.left{
  background:#0a0a0a;
  color:white;
  width:35%;
  min-height:100vh;
  padding:20px;
}

.profile{
  text-align:center;
}

.profile img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
}

.left h2{
  margin-top:15px;
  font-size:24px;
}

.section{
  margin-top:25px;
}

.section h3{
  border-bottom:2px solid #4facfe;
  padding-bottom:5px;
  margin-bottom:10px;
}

/* RIGHT SIDE */
.right{
  width:65%;
  padding:30px;
  background:#f5f5f5;
}

.right h2{
  margin-bottom:15px;
  border-bottom:2px solid #4facfe;
  display:inline-block;
}

input, textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
  border:1px solid #ccc;
}

textarea{
  height:80px;
}

/* MOBILE */
@media(max-width:768px){
  .left, .right{
    width:100%;
  }
}
</style>
</head>

<body>

<!-- LEFT -->
<div class="left">

  <div class="profile">
    <img src="https://via.placeholder.com/150" id="photo">
    <input type="file" onchange="loadImage(event)">
  </div>

  <h2 contenteditable="true" id="name">Your Name</h2>
  <p contenteditable="true">Software Engineer</p>

  <div class="section">
    <h3>Contact</h3>
    <p contenteditable="true">Email: your@email.com</p>
    <p contenteditable="true">Phone: 123456789</p>
    <p contenteditable="true">Location: Nepal</p>
  </div>

  <div class="section">
    <h3>Skills</h3>
    <p contenteditable="true">Java, Python, React</p>
  </div>

</div>

<!-- RIGHT -->
<div class="right">

  <h2>Personal Info</h2>
  <p contenteditable="true">Nationality: Nepalese</p>
  <p contenteditable="true">DOB: 2000</p>

  <h2>Experience</h2>
  <textarea id="exp">Write your experience...</textarea>

  <h2>Projects</h2>
  <textarea id="projects">Your projects...</textarea>

  <h2>Education</h2>
  <textarea id="edu">Your education...</textarea>

  <button onclick="downloadPDF()">Download PDF</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

<script>

// 📸 Image upload
function loadImage(event){
  document.getElementById("photo").src = URL.createObjectURL(event.target.files[0]);
}

// 📄 PDF
function downloadPDF(){
  html2pdf().from(document.body).save();
}

</script>

</body>
</html>
